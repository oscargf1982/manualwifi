<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Manual WiFi Edu.xunta</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- Theme color -->
<meta name="theme-color" content="#1a6cc8">

<!-- iOS / Safari PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WiFi Edu.xunta">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<!-- MS Tile -->
<meta name="msapplication-TileColor" content="#1a6cc8">
<meta name="msapplication-TileImage" content="icons/icon-144.png">

<!-- SEO -->
<meta name="description" content="Guia de conexion a la red Wi-Fi corporativa edu.xunta.gal para centros educativos de Galicia.">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:       #1a6cc8;
    --blue-dark:  #0f4a8a;
    --blue-mid:   #b8d3ee;
    --blue-light: #e8f2fc;
    --blue-pale:  #f2f7fd;
    --white:      #ffffff;
    --text-primary:   #0d2a4a;
    --text-secondary: #4a6a8a;
    --bg:         #ddeaf9;
    --card-bg:    #ffffff;
    --radius-card: 14px;
    --shadow: 0 4px 28px rgba(26,108,200,0.13);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 12px 40px;
  }

  .xw-card {
    background: var(--card-bg);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow);
    border: 1px solid var(--blue-mid);
    width: 100%;
    max-width: 620px;
    overflow: hidden;
  }

  /* ── HEADER IMAGE ── */
  .xw-header-img {
    display: block;
    width: 100%;
    height: auto;
    max-height: 220px;
    object-fit: cover;
    object-position: center top;
    border-radius: 0;
  }

  /* ── BODY ── */
  .xw-body { padding: clamp(16px, 4.5vw, 26px); }

  .xw-accent-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--blue) 0%, #5aabf0 100%);
    margin-bottom: 18px;
    border-radius: 2px;
  }

  /* ── SSID badge row ── */
  .xw-top-row {
    display: flex;
    align-items: flex-end;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .xw-wifi-badge {
    background: linear-gradient(135deg, var(--blue) 0%, #3d8fe0 100%);
    color: #fff;
    font-size: clamp(15px, 4vw, 20px);
    font-weight: 700;
    padding: 9px 18px;
    border-radius: 8px;
    display: inline-block;
    letter-spacing: 0.03em;
    box-shadow: 0 2px 8px rgba(26,108,200,0.25);
  }
  .xw-wifi-icon { flex-shrink: 0; margin-bottom: 22px; }

  .xw-subtitle {
    font-size: clamp(11.5px, 2.5vw, 13px);
    color: var(--text-secondary);
    margin: 6px 0 16px;
    line-height: 1.55;
  }

  /* ── OS TABS ── */
  .xw-os-label {
    font-size: clamp(11.5px, 2.5vw, 13px);
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .xw-os-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .xw-os-btn {
    background: var(--blue-pale);
    border: 2px solid var(--blue-mid);
    color: var(--blue);
    font-size: clamp(11px, 2.6vw, 13px);
    padding: 10px 8px 9px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.01em;
    transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
    flex: unset;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    line-height: 1.2;
  }
  .xw-os-btn svg { display: block; flex-shrink: 0; }
  .xw-os-btn:hover { background: var(--blue-light); border-color: var(--blue); }
  .xw-os-btn.active {
    background: linear-gradient(135deg, var(--blue) 0%, #3d8fe0 100%);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 3px 10px rgba(26,108,200,0.35);
  }
  .xw-os-btn.active svg .icon-blue { fill: white; }
  .xw-os-btn.active svg .icon-white { fill: rgba(255,255,255,0.25); }
  .xw-os-btn.active svg .icon-white-solid { fill: rgba(255,255,255,0.9); }
  .xw-os-btn.active svg line { stroke: white; }

  /* ── STEPS ── */
  .xw-steps { margin-bottom: 14px; }
  .xw-step {
    display: flex;
    gap: 11px;
    margin-bottom: 10px;
    align-items: flex-start;
  }
  .xw-step-n {
    min-width: 24px;
    height: 24px;
    background: linear-gradient(135deg, var(--blue) 0%, #3d8fe0 100%);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-radius: 50%;
    margin-top: 1px;
    box-shadow: 0 1px 5px rgba(26,108,200,0.3);
  }
  .xw-step-t {
    font-size: clamp(12px, 2.8vw, 13.5px);
    color: var(--text-primary);
    line-height: 1.6;
  }
  .xw-step-t strong { color: var(--blue-dark); }
  .xw-step-t em { color: var(--text-secondary); font-style: italic; }

  /* ── PARAMS TABLE ── */
  .xw-params {
    border: 1.5px solid var(--blue-mid);
    border-radius: 8px;
    overflow: hidden;
    margin-top: 14px;
    box-shadow: 0 1px 6px rgba(26,108,200,0.07);
  }
  .xw-params-head {
    background: linear-gradient(90deg, var(--blue) 0%, #3d8fe0 100%);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 8px 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .xw-param-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 14px;
    font-size: clamp(11.5px, 2.5vw, 13px);
    border-bottom: 1px solid var(--blue-mid);
    gap: 10px;
    flex-wrap: wrap;
  }
  .xw-param-row:last-child { border-bottom: none; }
  .xw-param-row:nth-child(even) { background: var(--blue-pale); }
  .xw-pk {
    color: var(--text-secondary);
    font-weight: 400;
    flex: 0 0 auto;
    min-width: 120px;
  }
  .xw-pv {
    font-weight: 600;
    color: var(--blue);
    text-align: right;
    flex: 1 1 auto;
    word-break: break-word;
  }



  /* ── RESPONSIVE: desktop ── */
  @media (min-width: 640px) {
    body { padding: 40px 24px 60px; }
    .xw-param-row { flex-wrap: nowrap; }
    .xw-pv { max-width: 55%; }
  }

  /* ── RESPONSIVE: very small phones ── */
  @media (max-width: 360px) {
    .xw-os-btn { padding: 7px 8px; font-size: 11.5px; }
    .xw-pk { min-width: 90px; }
    .xw-header-img { max-height: 140px; }
  }
</style>

  var h = '<div class="xw-steps">';
  d.steps.forEach(function(s, i) {
    h += '<div class="xw-step"><div class="xw-step-n">' + (i+1) + '</div><div class="xw-step-t">' + s + '</div></div>';
  });
  h += '</div>';
  h += '<div class="xw-params"><div class="xw-params-head">Parámetros de configuración</div>';
  d.params.forEach(function(p) {
    h += '<div class="xw-param-row"><span class="xw-pk">' + p[0] + '</span><span class="xw-pv">' + p[1] + '</span></div>';
  });
  h += '</div>';
  document.getElementById('xw-content').innerHTML = h;
}

xwShow('android', document.querySelector('.xw-os-btn'));
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./service-worker.js')
      .then(function(reg){ console.log('[PWA] SW:', reg.scope); })
      .catch(function(err){ console.warn('[PWA] SW error:', err); });
  });
}
(function(){
  var params = new URLSearchParams(window.location.search);
  var os = params.get('os');
  if (os) {
    requestAnimationFrame(function(){
      var btn = document.querySelector('.xw-os-btn[onclick*="' + os + '"]');
      if (btn) btn.click();
    });
  }
})();
</script>
</body>
</html>
